name: CI
on:
  pull_request:
  push:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: self-hosted, Linux, X64
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint, build, test affected packages
        run: pnpm turbo lint build test --filter='...[origin/main]'

      - name: Validate plugin registry
        run: pnpm run generate-registry --check

      - name: Validate packages
        run: pnpm turbo validate-package --filter='...[origin/main]'
